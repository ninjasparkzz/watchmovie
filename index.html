<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BingeBox Style Streaming Demo</title>
  <link rel="preconnect" href="https://image.tmdb.org" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Home">
      <span class="brand-mark"></span>
      <span>BingeBox</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="#movies">Movies</a>
      <a href="#shows">TV Shows</a>
      <a href="#watchlist">Watchlist</a>
    </nav>
    <label class="search">
      <span>Search</span>
      <input id="searchInput" type="search" placeholder="Search movies, shows..." autocomplete="off" />
    </label>
  </header>

  <main>
    <section class="hero" id="hero">
      <div class="hero-shade"></div>
      <div class="hero-content">
        <div class="meta-row" id="heroMeta"></div>
        <h1 id="heroTitle"></h1>
        <p id="heroOverview"></p>
        <div class="hero-actions">
          <button class="primary-btn" id="heroPlay">Play</button>
          <button class="ghost-btn" id="heroDetails">Details</button>
        </div>
      </div>
    </section>

    <section class="rail" id="continueSection">
      <div class="section-title">
        <h2>Continue Watching</h2>
        <button class="text-btn" id="clearProgress">Clear</button>
      </div>
      <div class="row" id="continueRow"></div>
    </section>

    <section class="rail" id="movies">
      <div class="section-title">
        <h2>Trending This Week</h2>
      </div>
      <div class="row" id="trendingRow"></div>
    </section>

    <section class="rail">
      <div class="section-title">
        <h2>Popular Movies</h2>
      </div>
      <div class="row" id="moviesRow"></div>
    </section>

    <section class="rail" id="shows">
      <div class="section-title">
        <h2>Top Rated TV Shows</h2>
      </div>
      <div class="row" id="showsRow"></div>
    </section>

    <section class="rail" id="watchlist">
      <div class="section-title">
        <h2>Your Watchlist</h2>
      </div>
      <div class="row" id="watchlistRow"></div>
    </section>
  </main>

  <footer>
    <span>BingeBox demo</span>
    <span>Uses legal demo playback URLs only</span>
  </footer>

  <dialog class="details-modal" id="detailsModal">
    <button class="close-btn" id="closeDetails" aria-label="Close">x</button>
    <div class="details-backdrop" id="detailsBackdrop"></div>
    <div class="details-body">
      <img id="detailsPoster" alt="" />
      <div>
        <div class="meta-row" id="detailsMeta"></div>
        <h2 id="detailsTitle"></h2>
        <p id="detailsOverview"></p>
        <div class="detail-actions">
          <button class="primary-btn" id="detailsPlay">Play</button>
          <button class="ghost-btn" id="watchlistToggle">Add to Watchlist</button>
        </div>
      </div>
    </div>
  </dialog>

  <dialog class="player-modal" id="playerModal">
    <div class="player-top">
      <div>
        <p>Now Playing</p>
        <h2 id="playerTitle"></h2>
      </div>
      <button class="close-btn" id="closePlayer" aria-label="Close">x</button>
    </div>
    <video id="videoPlayer" controls playsinline></video>
    <form class="custom-stream" id="customStreamForm">
      <label for="streamUrl">Custom legal MP4/HLS URL</label>
      <div>
        <input id="streamUrl" type="url" placeholder="https://example.com/video.mp4" />
        <button class="ghost-btn" type="submit">Load</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
