name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build DMG
        run: npm run build-dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: WatchTV-macOS-dmg
          path: dist_electron/*.dmg
